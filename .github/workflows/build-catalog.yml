name: Build Catalog

on:
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'scripts/build-catalog.js'
      - 'docs/index.html'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build catalog.json
        run: node scripts/build-catalog.js

      - name: Commit catalog.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/catalog.json
          git diff --cached --quiet || git commit -m "chore: rebuild catalog.json [skip ci]"
          git push
