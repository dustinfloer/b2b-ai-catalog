<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Demo Recipes</title>
    <link rel="icon" type="image/svg+xml" href="../logo.svg">
    <style>
        :root {
            --green-primary: #36d986;
            --green-glow: rgba(54, 217, 134, 0.15);
            --bg-deep: #0a0f1a;
            --bg-surface: #111827;
            --bg-card: #1a2332;
            --bg-card-hover: #1f2b3d;
            --border: #2a3548;
            --text-primary: #e8ecf1;
            --text-secondary: #8b95a5;
            --text-muted: #5a6577;
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.4), 0 0 20px rgba(54,217,134,0.08);
            --radius: 14px;
            --radius-sm: 8px;

            --c-wholesale:     #36d986;
            --c-wholesale-bg:  rgba(54,217,134,0.12);
            --c-distribution:  #60a5fa;
            --c-distribution-bg: rgba(96,165,250,0.12);
            --c-manufacturing: #a78bfa;
            --c-manufacturing-bg: rgba(167,139,250,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-deep);
            background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .header-logo { height: 56px; width: auto; }
        .header-nav { display: flex; gap: 6px; align-items: center; }

        .nav-link {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .nav-link:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .nav-link.active { color: var(--green-primary); background: var(--green-glow); }

        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 24px 0;
            text-align: center;
        }

        .hero h2 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.4px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--green-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p { color: var(--text-secondary); font-size: 14px; }

        .controls {
            max-width: 1200px;
            margin: 24px auto 0;
            padding: 0 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box { flex: 1; min-width: 240px; position: relative; }

        .search-box input {
            width: 100%;
            padding: 11px 16px 11px 42px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--bg-surface);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .search-box input::placeholder { color: var(--text-muted); }
        .search-box input:focus {
            outline: none;
            border-color: var(--green-primary);
            box-shadow: 0 0 0 3px var(--green-glow);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }

        .filter-btn {
            padding: 7px 13px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover { border-color: var(--green-primary); color: var(--green-primary); }
        .filter-btn.active { background: var(--green-glow); border-color: var(--green-primary); color: var(--green-primary); }

        .stats {
            max-width: 1200px;
            margin: 16px auto 0;
            padding: 0 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .grid {
            max-width: 1200px;
            margin: 12px auto 60px;
            padding: 0 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: var(--green-primary);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .card-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }

        [data-model="Wholesale"]     .card-bar { background: linear-gradient(90deg, var(--c-wholesale), transparent); }
        [data-model="Distribution"]  .card-bar { background: linear-gradient(90deg, var(--c-distribution), transparent); }
        [data-model="Manufacturing"] .card-bar { background: linear-gradient(90deg, var(--c-manufacturing), transparent); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 6px;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-emoji { font-size: 20px; }
        .card h3 { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.2px; }

        .model-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        [data-model="Wholesale"]     .model-badge { background: var(--c-wholesale-bg);     color: var(--c-wholesale); }
        [data-model="Distribution"]  .model-badge { background: var(--c-distribution-bg);  color: var(--c-distribution); }
        [data-model="Manufacturing"] .model-badge { background: var(--c-manufacturing-bg); color: var(--c-manufacturing); }

        .card-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .recipe-stats {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .stat-pill strong {
            color: var(--text-primary);
            font-weight: 700;
        }

        .card-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .card-meta span { display: flex; align-items: center; gap: 3px; }

        .talking-points {
            margin-bottom: 12px;
        }

        .talking-points summary {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .talking-points summary::-webkit-details-marker { display: none; }
        .talking-points summary::before { content: "\25B6"; font-size: 8px; transition: transform 0.2s; }
        .talking-points[open] summary::before { transform: rotate(90deg); }

        .talking-points ul {
            margin: 8px 0 0 16px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
            margin-top: auto;
            gap: 10px;
        }

        .store-toggle {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .toggle-btn {
            font-size: 11px;
            font-weight: 500;
            padding: 5px 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
        }

        .toggle-btn:hover:not(.active) { color: var(--text-secondary); }

        .copy-btn {
            font-size: 12px;
            font-weight: 600;
            color: var(--bg-deep);
            background: var(--green-primary);
            border: none;
            padding: 7px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .copy-btn:hover {
            box-shadow: 0 0 16px rgba(54, 217, 134, 0.3);
            transform: translateY(-1px);
        }

        .copy-btn.copied {
            background: rgba(54, 217, 134, 0.2);
            color: var(--green-primary);
        }

        .empty-state, .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 15px;
        }

        footer {
            text-align: center;
            padding: 32px 24px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
        }

        footer a { color: var(--text-secondary); text-decoration: none; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
            .search-box { min-width: 100%; }
            .card-footer { flex-direction: column; align-items: stretch; gap: 8px; }
            .store-toggle { justify-content: center; }
            .copy-btn { text-align: center; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="../"><img src="../logo.svg" alt="SE Field Guide" class="header-logo"></a>
            <nav class="header-nav">
                <a href="../" class="nav-link">Catalog</a>
                <a href="../learnings/" class="nav-link">Field Learnings</a>
                <a href="../apps/" class="nav-link">App Directory</a>
                <a href="../demos/" class="nav-link active">Demo Recipes</a>
                <a href="../slide-decks/" class="nav-link">Slide Decks</a>
            </nav>
        </div>
    </header>

    <div class="hero">
        <h2>B2B Demo Recipes</h2>
        <p>Pre-built demo store configs — pick a profile, copy the prompt, paste into Claude Code.</p>
    </div>

    <div class="controls">
        <div class="search-box">
            <span class="search-icon">&#x1F50D;</span>
            <input type="text" id="search" placeholder="Search by industry, model, or keyword..." />
        </div>
        <div class="filter-group" id="filter-group"></div>
    </div>

    <div class="stats" id="stats"></div>
    <div class="grid" id="grid"><div class="loading">Loading recipes...</div></div>

    <footer>
        Prompts use <a href="https://shopifyclaudemcp1.quick.shopify.io/" target="_blank" rel="noopener">Shopify MCP</a> + <a href="https://github.com/Shopify/spark-mcp" target="_blank" rel="noopener">Spark MCP</a> + <a href="https://github.com/Shopify/forge-mcp" target="_blank" rel="noopener">Forge MCP</a> &middot; [INTERNAL-ONLY]
    </footer>

    <script>
        const MODELS = ['Wholesale', 'Distribution', 'Manufacturing'];
        let recipes = [];
        let activeFilter = 'all';
        let storeMode = {};

        async function loadRecipes() {
            try {
                const res = await fetch('recipes.json?v=' + Date.now());
                recipes = await res.json();
                recipes.forEach(r => storeMode[r.id] = 'new');
                buildFilters();
                render();
            } catch (e) {
                document.getElementById('grid').innerHTML = '<div class="empty-state">Could not load recipes.</div>';
            }
        }

        function buildFilters() {
            const group = document.getElementById('filter-group');
            group.innerHTML = '<button class="filter-btn active" data-filter="all">All (' + recipes.length + ')</button>' +
                MODELS.map(function(m) {
                    var count = recipes.filter(function(r) { return r.model === m; }).length;
                    return count > 0
                        ? '<button class="filter-btn" data-filter="' + esc(m) + '">' + esc(m) + ' (' + count + ')</button>'
                        : '';
                }).join('');

            group.querySelectorAll('.filter-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    group.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                    activeFilter = btn.dataset.filter;
                    render();
                });
            });
        }

        function render() {
            var query = document.getElementById('search').value.toLowerCase();
            var filtered = recipes.filter(function(r) {
                var matchesFilter = activeFilter === 'all' || r.model === activeFilter;
                var matchesSearch = !query ||
                    r.name.toLowerCase().includes(query) ||
                    r.industry.toLowerCase().includes(query) ||
                    r.model.toLowerCase().includes(query) ||
                    r.description.toLowerCase().includes(query) ||
                    r.tags.some(function(t) { return t.includes(query); });
                return matchesFilter && matchesSearch;
            });

            document.getElementById('stats').textContent = 'Showing ' + filtered.length + ' of ' + recipes.length + ' recipes';

            var grid = document.getElementById('grid');
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">No recipes match your search.</div>';
                return;
            }

            grid.innerHTML = filtered.map(function(r) {
                var c = r.config;
                var stats = '<div class="stat-pill"><strong>' + c.b2b_companies + '</strong> companies</div>' +
                    '<div class="stat-pill"><strong>' + c.b2b_orders + '</strong> B2B orders</div>';
                if (c.dtc_included) {
                    stats += '<div class="stat-pill"><strong>' + c.dtc_orders + '</strong> DTC orders</div>';
                }

                var verticals = r.verticals.map(function(v) { return v; }).join(', ');
                var points = r.demo_talking_points.map(function(p) { return '<li>' + esc(p) + '</li>'; }).join('');
                var catalogs = (r.catalogs || []).map(function(cat) {
                    return '<span class="stat-pill"><strong>' + esc(cat.name) + '</strong> ' + cat.adjustment + ' / ' + cat.terms.replace(/_/g, ' ').toLowerCase() + '</span>';
                }).join('');
                var mode = storeMode[r.id] || 'new';

                return '<div class="card" data-model="' + esc(r.model) + '">' +
                    '<div class="card-bar"></div>' +
                    '<div class="card-header">' +
                        '<div class="card-title">' +
                            '<span class="card-emoji">' + r.emoji + '</span>' +
                            '<h3>' + esc(r.name) + '</h3>' +
                        '</div>' +
                        '<span class="model-badge">' + esc(r.model) + '</span>' +
                    '</div>' +
                    '<p class="card-desc">' + esc(r.description) + '</p>' +
                    '<div class="recipe-stats">' + stats + '</div>' +
                    (catalogs ? '<div class="recipe-stats">' + catalogs + '</div>' : '') +
                    '<div class="card-meta">' +
                        '<span>' + esc(verticals) + '</span>' +
                        '<span>~' + r.estimated_minutes + ' min</span>' +
                        '<span>' + c.fulfillment_value + '% fulfilled</span>' +
                    '</div>' +
                    '<details class="talking-points">' +
                        '<summary>Demo talking points</summary>' +
                        '<ul>' + points + '</ul>' +
                    '</details>' +
                    '<div class="card-footer">' +
                        '<div class="store-toggle">' +
                            '<button class="toggle-btn ' + (mode === 'new' ? 'active' : '') + '" onclick="setMode(\'' + r.id + '\', \'new\', this)">New Store</button>' +
                            '<button class="toggle-btn ' + (mode === 'existing' ? 'active' : '') + '" onclick="setMode(\'' + r.id + '\', \'existing\', this)">Existing</button>' +
                        '</div>' +
                        '<button class="copy-btn" onclick="copyPrompt(this, \'' + r.id + '\')">Copy Prompt</button>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function setMode(id, mode, btn) {
            storeMode[id] = mode;
            var toggle = btn.parentElement;
            toggle.querySelectorAll('.toggle-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
        }

        function generatePrompt(recipe) {
            var c = recipe.config;
            var mode = storeMode[recipe.id] || 'new';
            var today = new Date().toISOString().split('T')[0];
            var start = new Date(Date.now() - (c.order_days_back || 90) * 86400000).toISOString().split('T')[0];
            var verticals = recipe.verticals.map(function(v) { return '"' + v + '"'; }).join(' and ');
            var steps = [];
            var stepNum = 1;

            // Phase 1: Store
            if (mode === 'new') {
                steps.push(stepNum++ + '. Create a new Shopify demo store named "' + recipe.store_name_suggestion + '" in ' + recipe.country + ' with sandbox=true using Forge MCP (create_store).');
            }

            // Phase 2: B2B Setup via Shopify MCP (Kevin's custom MCP)
            steps.push(stepNum++ + '. Set up B2B on the store using the Shopify MCP (shopify-mcp):');

            // Market
            steps.push('   a. Create a B2B market named "' + recipe.model + '" scoped to all company locations.');

            // Catalogs + price lists
            var catalogNames = [];
            (recipe.catalogs || []).forEach(function(cat, i) {
                var letter = String.fromCharCode(98 + i); // b, c, d...
                catalogNames.push(cat.name);
                var priceDesc = cat.adjustment === '0%' ? 'no price adjustment (base pricing)' : cat.adjustment + ' price adjustment';
                steps.push('   ' + letter + '. Create catalog "' + cat.name + '" with a price list at ' + priceDesc + '. Set payment terms to ' + cat.terms.replace(/_/g, ' ') + '.');
            });

            // Phase 3: Spark connect (after B2B setup so it sees markets/catalogs)
            if (mode === 'new') {
                steps.push(stepNum++ + '. Connect to the new store using Spark MCP (connect_to_store). Verify the B2B market and catalogs (' + catalogNames.join(', ') + ') appear in the response.');
            } else {
                steps.push(stepNum++ + '. Connect to [YOUR-STORE.myshopify.com] using Spark MCP (connect_to_store). Verify B2B market and catalogs appear.');
            }

            // Phase 4: Products
            steps.push(stepNum++ + '. Generate products using the ' + verticals + ' vertical(s) with source_data="static".');

            // Phase 5: DTC (optional)
            if (c.dtc_included) {
                steps.push(stepNum++ + '. Generate ' + c.dtc_customers + ' DTC customers across all DTC/consumer markets.');
                steps.push(stepNum++ + '. Generate ' + c.dtc_orders + ' DTC orders from ' + start + ' to ' + today + ' with ' + c.fulfillment_value + '% fulfillment and ' + c.dtc_new_customer_pct + '% new customers.');
            }

            // Phase 6: B2B companies + orders
            steps.push(stepNum++ + '. Generate ' + c.b2b_companies + ' B2B companies across all B2B markets and catalogs.');
            steps.push(stepNum++ + '. Generate ' + c.b2b_orders + ' B2B orders in ' + c.b2b_mode + ' mode from ' + start + ' to ' + today + ' with ' + c.fulfillment_value + '% fulfillment, ' + c.b2b_draft_orders_pct + '% draft orders, and ' + c.b2b_new_companies_pct + '% new companies.');

            // Phase 7: Demo buyer info
            steps.push(stepNum++ + '. After all data is generated, provide me with a company contact email I can use to log in as a B2B buyer on the storefront (email + one-time PIN authentication). Include the store URL and admin URL.');

            var prompt = 'Set up a complete B2B demo store: "' + recipe.name + '" (' + recipe.industry + ' / ' + recipe.model + ')\n\n';
            prompt += steps.join('\n');
            prompt += '\n\nUse the market_ids and catalog_ids returned by connect_to_store for all Spark generate calls. For B2B setup (markets, catalogs, companies), use the Shopify MCP (shopify-mcp). Requires: Shopify MCP configured with a Custom App token that has write_markets, write_catalogs, and write_companies scopes.';

            return prompt;
        }

        function copyPrompt(btn, id) {
            var recipe = recipes.find(function(r) { return r.id === id; });
            if (!recipe) return;
            var prompt = generatePrompt(recipe);
            navigator.clipboard.writeText(prompt).then(function() {
                var original = btn.textContent;
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = original;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function esc(str) {
            if (!str) return '';
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        document.getElementById('search').addEventListener('input', render);
        loadRecipes();
    </script>
</body>
</html>
