<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 76" role="img" aria-label="B2B Tools">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    Pointy-top hexagons, circumradius R=14 (spacing), display r=12 (polygon)
    Adjacent center distance = R*√3 = 24.25
    Diagonal offsets: (R*√3/2, R*1.5) = (12.12, 21)
    Cluster center: (44, 38)
    Hex polygon points (r=12): 0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6
  -->
  <g transform="translate(44,38)" filter="url(#glow)">
    <!-- Center — full brightness -->
    <polygon points="0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6" fill="url(#hexGrad)"/>
    <!-- Upper-right -->
    <polygon points="0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6" transform="translate(12.12,-21)" fill="#fbbf24" opacity="0.88"/>
    <!-- Right -->
    <polygon points="0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6" transform="translate(24.25,0)" fill="#fbbf24" opacity="0.78"/>
    <!-- Lower-right -->
    <polygon points="0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6" transform="translate(12.12,21)" fill="#fbbf24" opacity="0.72"/>
    <!-- Lower-left -->
    <polygon points="0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6" transform="translate(-12.12,21)" fill="#fbbf24" opacity="0.62"/>
    <!-- Left -->
    <polygon points="0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6" transform="translate(-24.25,0)" fill="#fbbf24" opacity="0.52"/>
    <!-- Upper-left -->
    <polygon points="0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6" transform="translate(-12.12,-21)" fill="#fbbf24" opacity="0.68"/>
  </g>

  <!-- Wordmark -->
  <text x="96" y="34"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26" font-weight="800" fill="#e8ecf1" letter-spacing="-0.5">B2B</text>
  <text x="97" y="57"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="13" font-weight="600" fill="#fbbf24" letter-spacing="4">TOOLS</text>
</svg>
